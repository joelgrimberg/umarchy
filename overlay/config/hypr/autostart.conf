# Ubuntu-specific Hyprland overrides applied AFTER Omarchy's defaults.
#
# PATH: Omarchy's autostart calls helpers like `omarchy-hyprland-monitor-watch`
# from ~/.local/share/omarchy/bin. The graphical session inherits PATH from
# SDDM/PAM, which does NOT include that dir, so those calls fail unless we
# prepend it here. Hyprland's `env =` directive applies to all processes
# Hyprland subsequently launches (incl. all `exec-once` and dispatcher execs).
env = PATH,$HOME/.local/share/omarchy/bin:/usr/local/bin:/usr/bin:/bin

# Polkit: Omarchy's default autostart hard-codes the polkit-gnome agent path,
# which doesn't exist on Ubuntu. We install hyprpolkitagent and launch it here.
exec-once = /usr/libexec/hyprpolkitagent

# Add extra user autostart processes below:
# exec-once = uwsm-app -- my-service

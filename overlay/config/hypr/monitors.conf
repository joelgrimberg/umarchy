# Monitor setup. The default uses Hyprland's auto-detection at full preferred
# resolution. Override per-display by uncommenting and adapting one of the
# examples below. List your outputs with: hyprctl monitors
#
# monitor = , preferred, auto, 1
# monitor = eDP-1, 1920x1080@60, 0x0, 1
# monitor = HDMI-A-1, 2560x1440@144, 1920x0, 1

monitor = , preferred, auto, 1
